<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Asset — Lotto 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a2f42;
    --accent: #3b82f6;
    --accent2: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; }
  .logo span { color: var(--text3); }

  .search-wrap { display: flex; gap: 8px; align-items: center; }
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    width: 260px;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }

  .btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  .container { display: flex; height: calc(100vh - 56px); }

  /* SIDEBAR ENTI */
  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }

  .sidebar-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 16px;
  }

  .ente-item {
    padding: 8px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text2);
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }
  .ente-item:hover { background: var(--surface2); color: var(--text); }
  .ente-item.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
  .ente-icon { font-size: 14px; }

  /* MAIN CONTENT */
  .main { flex: 1; overflow-y: auto; padding: 20px; }

  /* TREE */
  .tree-container { }

  .tree-node { margin-bottom: 4px; }

  .tree-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }
  .tree-row:hover { background: var(--surface); }
  .tree-row.selected { background: var(--surface2); }

  .tree-toggle {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .tree-toggle.open { transform: rotate(90deg); }

  .tree-icon { font-size: 14px; flex-shrink: 0; }
  .tree-label { font-size: 13px; color: var(--text); font-weight: 500; }
  .tree-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 3px;
  }

  .tree-children { padding-left: 24px; display: none; }
  .tree-children.open { display: block; }

  /* LIVELLO SEDE */
  .sede-row { }
  .sede-row .tree-icon { color: #60a5fa; }
  .sede-row .tree-label { color: var(--text2); font-weight: 400; font-size: 12px; }

  /* LIVELLO PIANO */
  .piano-row .tree-icon { color: var(--text3); }
  .piano-row .tree-label { color: var(--text3); font-size: 12px; }

  /* LIVELLO ASSET */
  .asset-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-top: 4px;
    margin-bottom: 8px;
  }
  .asset-table thead { background: var(--surface2); }
  .asset-table th {
    padding: 6px 10px;
    text-align: left;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .asset-table td {
    padding: 5px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
  }
  .asset-table tr:hover td { background: var(--surface); color: var(--text); }
  .asset-table .mono { font-family: var(--mono); font-size: 10px; color: var(--text); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
  }
  .badge-green { background: rgba(16,185,129,0.15); color: #10b981; }
  .badge-warn { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-red { background: rgba(239,68,68,0.15); color: #ef4444; }
  .badge-blue { background: rgba(59,130,246,0.15); color: #3b82f6; }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 12px 0;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--accent); }
  .stat-lbl { font-family: var(--mono); font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty { text-align:center; padding:20px; color:var(--text3); font-size:12px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div class="logo">INVENTARIO <span>— LOTTO 3</span></div>
  <div class="search-wrap">
    <input type="text" class="search-box" id="search-global" placeholder="Cerca tag, seriale, tipo..." oninput="searchAssets(this.value)">
    <button class="btn btn-ghost" onclick="openNormalizza()">⚙ Normalizza dati</button>
    <button class="btn btn-ghost" onclick="exportCMDB()">↓ Export CMDB</button>
    <button class="btn btn-ghost" onclick="collapseAll()">↑ Chiudi tutto</button>
    <button class="btn btn-ghost" onclick="expandAll()">↓ Espandi tutto</button>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-title">Enti</div>
    <div id="sidebar-enti"></div>
  </div>

  <div class="main" id="main-content">
    <div class="loading">Caricamento struttura...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://idbafibnmlesedejdvin.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkYmFmaWJubWxlc2VkZWpkdmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTc1MzgsImV4cCI6MjA5NjM3MzUzOH0.hoVRc-ycsVP5K1gJFYIrU864CKn-sEpLBPrTWIpkBuE';
const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

async function sbGet(path) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: SB_HEADERS });
  if (!r.ok) return [];
  return r.json();
}

let entiData = [];
let currentEnteId = null;
let treeData = {};

// Mappa enti
const ENTI_ICONE = {
  'ASST Brianza': '🏥', 'ASST Lariana': '🏥', 'ASST Lecco': '🏥',
  'IRCCS San Gerardo': '🔬', 'ASST Sette Laghi': '🏥', 'ASST Valcamonica': '🏥',
  'ASST Valle Olona': '🏥', 'ASST Valtellina e Alto Lario': '🏥',
  'ATS Brianza': '🏛️', 'ATS Insubria': '🏛️', 'ATS Montagna': '🏛️',
  'IRCCS INRCA': '🔬'
};

async function init() {
  entiData = await sbGet('enti?select=*&order=nome.asc');
  renderSidebar();
  if (entiData.length > 0) selectEnte(entiData[0]);
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar-enti');
  sidebar.innerHTML = entiData.map(e => `
    <div class="ente-item" id="sidebar-${e.id}" onclick="selectEnte(${JSON.stringify(e).replace(/"/g, '&quot;')})">
      <span class="ente-icon">${ENTI_ICONE[e.nome] || '🏥'}</span>
      <span>${e.nome}</span>
    </div>
  `).join('');
}

async function selectEnte(ente) {
  currentEnteId = ente.id;
  document.querySelectorAll('.ente-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`sidebar-${ente.id}`);
  if (el) el.classList.add('active');

  document.getElementById('main-content').innerHTML = `<div class="loading">⟳ Caricamento ${ente.nome}...</div>`;

  // Carica struttura sede→piano→asset
  await loadEnteTree(ente);
}

async function loadEnteTree(ente) {
  // Carica asset dell'ente con i campi necessari
  let offset = 0;
  let allAssets = [];
  while (true) {
    const batch = await sbGet(`asset?select=id,tag_asset,numero_serie,codice_elemento,status,tipo_sede,piano,building&ente_id=eq.${ente.id}&limit=1000&offset=${offset}`);
    if (!batch || batch.length === 0) break;
    allAssets = allAssets.concat(batch);
    offset += 1000;
    if (batch.length < 1000) break;
  }

  // Raggruppa per sede → piano
  const tree = {};
  allAssets.forEach(a => {
    const sede = a.tipo_sede || '— Sede non assegnata';
    const piano = a.piano || '— Piano non assegnato';
    if (!tree[sede]) tree[sede] = {};
    if (!tree[sede][piano]) tree[sede][piano] = [];
    tree[sede][piano].push(a);
  });

  treeData[ente.id] = tree;
  renderTree(ente, tree, allAssets.length);
}

function renderTree(ente, tree, totalAssets) {
  const sedi = Object.keys(tree).sort();
  const main = document.getElementById('main-content');

  let html = `
    <div class="stats-bar">
      <div class="stat"><div class="stat-val">${totalAssets.toLocaleString()}</div><div class="stat-lbl">Asset totali</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--accent2)">${sedi.length}</div><div class="stat-lbl">Sedi</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--warn)">${Object.values(tree).reduce((acc, s) => acc + Object.keys(s).length, 0)}</div><div class="stat-lbl">Piani</div></div>
    </div>
    <div class="tree-container">
  `;

  sedi.forEach((sede, si) => {
    const piani = Object.keys(tree[sede]).sort();
    const totSede = piani.reduce((acc, p) => acc + tree[sede][p].length, 0);

    html += `
      <div class="tree-node">
        <div class="tree-row sede-row" onclick="toggleNode('sede-${si}')">
          <div class="tree-toggle" id="toggle-sede-${si}">▶</div>
          <div class="tree-icon">📍</div>
          <div class="tree-label">${sede}</div>
          <div class="tree-count">${totSede}</div>
        </div>
        <div class="tree-children" id="sede-${si}">
    `;

    piani.forEach((piano, pi) => {
      const assets = tree[sede][piano];
      const nodeId = `piano-${si}-${pi}`;

      html += `
        <div class="tree-node">
          <div class="tree-row piano-row" onclick="toggleNode('${nodeId}')">
            <div class="tree-toggle" id="toggle-${nodeId}">▶</div>
            <div class="tree-icon">🏢</div>
            <div class="tree-label">${piano}</div>
            <div class="tree-count">${assets.length}</div>
          </div>
          <div class="tree-children" id="${nodeId}">
            ${renderAssetTable(assets)}
          </div>
        </div>
      `;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  main.innerHTML = html;
}

function renderAssetTable(assets) {
  if (!assets.length) return '<div class="empty">Nessun asset</div>';
  return `
    <table class="asset-table">
      <thead>
        <tr>
          <th>Tag Asset</th>
          <th>Seriale</th>
          <th>Tipo</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${assets.map(a => `
          <tr>
            <td class="mono">${a.tag_asset || '—'}</td>
            <td class="mono">${a.numero_serie || '—'}</td>
            <td><span class="badge badge-blue">${a.codice_elemento || '—'}</span></td>
            <td>${statusBadge(a.status)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function statusBadge(s) {
  if (!s) return '<span class="badge badge-warn">—</span>';
  const sl = s.toLowerCase();
  if (sl.includes('attiv') || sl.includes('in use')) return `<span class="badge badge-green">${s}</span>`;
  if (sl.includes('dismess') || sl.includes('retired')) return `<span class="badge badge-red">${s}</span>`;
  return `<span class="badge badge-warn">${s}</span>`;
}

function toggleNode(id) {
  const children = document.getElementById(id);
  const toggle = document.getElementById(`toggle-${id}`);
  if (!children) return;
  const isOpen = children.classList.contains('open');
  children.classList.toggle('open', !isOpen);
  if (toggle) toggle.classList.toggle('open', !isOpen);
}

function collapseAll() {
  document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.tree-toggle').forEach(el => el.classList.remove('open'));
}

function expandAll() {
  document.querySelectorAll('.tree-children').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.tree-toggle').forEach(el => el.classList.add('open'));
}

function searchAssets(q) {
  if (!q || q.length < 3) return;
  // TODO: search globale
}

// NORMALIZZA DATI
function openNormalizza() {
  document.getElementById('normalizza-overlay').style.display = 'flex';
  // Popola select enti
  const sel = document.getElementById('norm-ente');
  sel.innerHTML = '<option value="">Tutti</option>' + entiData.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
  loadValoriDistinti();
}

function closeNormalizza() {
  document.getElementById('normalizza-overlay').style.display = 'none';
}

async function loadValoriDistinti() {
  const campo = document.getElementById('norm-campo').value;
  const enteId = document.getElementById('norm-ente').value;
  const cont = document.getElementById('norm-valori');
  cont.innerHTML = '<div class="loading">⟳ Caricamento valori...</div>';

  // Carica tutti gli asset con quel campo
  let allAssets = [];
  let offset = 0;
  while (true) {
    let url = `asset?select=${campo}&limit=1000&offset=${offset}`;
    if (enteId) url += `&ente_id=eq.${enteId}`;
    const batch = await sbGet(url);
    if (!batch || batch.length === 0) break;
    allAssets = allAssets.concat(batch);
    offset += 1000;
    if (batch.length < 1000) break;
  }

  // Conta valori distinti
  const conteggio = {};
  allAssets.forEach(a => {
    const val = a[campo] || '(vuoto)';
    conteggio[val] = (conteggio[val] || 0) + 1;
  });

  const valori = Object.entries(conteggio).sort((a, b) => b[1] - a[1]);
  document.getElementById('norm-info').textContent = `${valori.length} valori distinti trovati`;

  cont.innerHTML = valori.map(([val, count]) => `
    <label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px">
      <input type="checkbox" class="norm-check" value="${val.replace(/"/g, '&quot;')}">
      <span style="flex:1;color:var(--text)">${val}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:3px">${count}</span>
    </label>
  `).join('');
}

async function applicaNormalizzazione() {
  const campo = document.getElementById('norm-campo').value;
  const enteId = document.getElementById('norm-ente').value;
  const nuovoValore = document.getElementById('norm-nuovo-valore').value.trim();

  if (!nuovoValore) { alert('Inserisci il nuovo valore'); return; }

  const selezionati = Array.from(document.querySelectorAll('.norm-check:checked')).map(c => c.value);
  if (selezionati.length === 0) { alert('Seleziona almeno un valore'); return; }

  if (!confirm(`Sostituire ${selezionati.length} valori con "${nuovoValore}"?`)) return;

  document.getElementById('norm-info').textContent = '⟳ Aggiornamento in corso...';

  // Per ogni valore selezionato, aggiorna tutti gli asset
  let totale = 0;
  for (const vecchio of selezionati) {
    let url = `${SUPABASE_URL}/rest/v1/asset?${campo}=eq.${encodeURIComponent(vecchio)}`;
    if (enteId) url += `&ente_id=eq.${enteId}`;
    await fetch(url, {
      method: 'PATCH',
      headers: {...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal'},
      body: JSON.stringify({ [campo]: nuovoValore })
    });
    totale++;
  }

  document.getElementById('norm-nuovo-valore').value = '';
  await loadValoriDistinti();
  document.getElementById('norm-info').textContent = `✓ ${totale} valori normalizzati in "${nuovoValore}"`;
}

// EXPORT CMDB formato Matteo
async function exportCMDB() {
  const ente = entiData.find(e => e.id === currentEnteId);
  if (!ente) { alert('Seleziona un ente'); return; }

  // Carica tutti gli asset dell'ente con tutti i campi
  let allAssets = [];
  let offset = 0;
  while (true) {
    const batch = await sbGet(`asset?select=*&ente_id=eq.${currentEnteId}&limit=1000&offset=${offset}`);
    if (!batch || batch.length === 0) break;
    allAssets = allAssets.concat(batch);
    offset += 1000;
    if (batch.length < 1000) break;
  }

  if (!allAssets.length) { alert('Nessun asset da esportare'); return; }

  // Mappa i campi nel formato CMDB di Matteo (colonne in ordine)
  const rows = allAssets.map(a => ({
    'Data': '',
    'Pratica': '',
    'Tecnico': '',
    'AssetID_Fleet2': a.tag_asset || '',
    'SerialNumber': a.numero_serie || '',
    'CodiceElemento1': a.codice_elemento || '',
    'L3_Indirizzo': a.l2_sede || '',
    'L2_Sede': a.tipo_sede || '',
    'L4_BuildingOrPadiglione': a.building || '',
    'L6_Piano': a.piano || '',
    'L5_Reparto': a.servizio_uo || '',
    'L7_Stanza': a.stanza || '',
    'UOS': a.servizio_uo || '',
    'ModalitaUtilizzo': a.modalita_utilizzo || '',
    'Status': a.status || '',
    'Installed': a.data_installazione || '',
    'Data Dismissione': '',
    'Assegnatario': a.user_assegnatario || '',
    'Proprieta': a.proprieta || '',
    'ResponsabileGestione': a.contraente_gestione || '',
    'HostName': '',
    'IPAddress': '',
    'PdL': a.is_pdl || '',
    'DataInizioLocazione': a.inizio_locazione || '',
    'DataFineLocazione': a.fine_locazione || ''
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Asset');
  XLSX.writeFile(wb, `CMDB_${ente.nome.replace(/\s/g, '_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

init();
</script>
<!-- MODALE NORMALIZZA -->
<div id="normalizza-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:700px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div style="font-family:var(--mono);font-size:14px;font-weight:600">Normalizza Dati</div>
      <button class="btn btn-ghost" onclick="closeNormalizza()">✕ Chiudi</button>
    </div>
    <div style="padding:20px;overflow-y:auto">
      <div style="display:flex;gap:12px;margin-bottom:16px;align-items:center">
        <label style="font-size:12px;color:var(--text2)">Campo:</label>
        <select id="norm-campo" onchange="loadValoriDistinti()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:13px">
          <option value="piano">Piano</option>
          <option value="building">Building/Padiglione</option>
          <option value="servizio_uo">Reparto</option>
        </select>
        <label style="font-size:12px;color:var(--text2)">Ente:</label>
        <select id="norm-ente" onchange="loadValoriDistinti()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:13px">
          <option value="">Tutti</option>
        </select>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:12px;align-items:center">
        <input type="text" id="norm-nuovo-valore" placeholder="Nuovo valore..." style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px">
        <button class="btn" style="background:var(--accent);color:white" onclick="applicaNormalizzazione()">Applica ai selezionati</button>
      </div>

      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:8px" id="norm-info">Seleziona i valori da unificare</div>

      <div id="norm-valori" style="max-height:350px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
        <div class="loading">Seleziona un campo</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
